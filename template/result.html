<!DOCTYPE html>
<html>
<head>
<title>AI Resume Analyzer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
padding:30px;
}

.container{
width:1000px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:40px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:30px;
font-size:32px;
}

.top-section{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.score-circle{
width:160px;
height:160px;
border-radius:50%;
background:conic-gradient(#00e5ff {{score}}%, #ffffff20 {{score}}%);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

.role{
font-size:22px;
color:#ffd54f;
}

.section{
margin-top:25px;
}

.section h2{
margin-bottom:15px;
font-size:22px;
}

.skills{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.skill{
padding:10px 15px;
border-radius:8px;
font-size:14px;
}

.found{
background:#00c853;
}

.missing{
background:#ff5252;
}

.suggestions{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:10px;
}

.suggestions li{
margin:8px 0;
}

button{
margin-top:30px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">

<h1>AI Resume Analyzer Dashboard</h1>

<div class="top-section">

<div class="score-circle">
{{score}}%
</div>

<div class="role">
Predicted Job Role: <b>{{job_role}}</b>
</div>

</div>

<div class="section">
<h2>Skills Found</h2>

<div class="skills">

{% for skill in found %}
<div class="skill found">{{skill}}</div>
{% endfor %}

</div>

</div>

<div class="section">
<h2>Missing Skills</h2>

<div class="skills">

{% for skill in missing %}
<div class="skill missing">{{skill}}</div>
{% endfor %}

</div>

</div>

<div class="section">
<h2>AI Suggestions</h2>

<div class="suggestions">

<ul>
{% for s in suggestions %}
<li>{{s}}</li>
{% endfor %}
</ul>

</div>

</div>

<a href="/">
<button>Analyze Another Resume</button>
</a>

</div>

</body>
</html>
